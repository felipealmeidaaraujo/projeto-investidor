name: Atualizar jogos do dia (grade)

# Regenera SÓ a grade de jogos (web/today.json) de forma frequente, pra o status
# (ao vivo / agendado) não ficar defasado. NÃO re-treina os modelos — usa os
# web/model-*.json já commitados pelo robô diário (update-model.yml). Por isso é
# leve e barato o suficiente pra rodar de hora em hora.
#
# Faz o deploy ele mesmo (configure/upload/deploy-pages), como o update-model:
# um push feito com o GITHUB_TOKEN NÃO dispara o deploy.yml (proteção anti-loop),
# então não dá pra depender do push pra publicar.

on:
  schedule:
    # O agendador do GitHub é BEST-EFFORT e descarta primeiro os jobs marcados nos minutos
    # de PICO — :00 e :30, onde todo mundo agenda. O cron antigo (*/30) caía justo neles e
    # por isso ficava horas parado (medido em 20/07: intervalos de 137, 161, 205 min e um
    # buraco de 7h de madrugada, com o cron marcando 30 min).
    #
    # Correção: 4 tentativas por hora em minutos QUEBRADOS (7,22,37,52), longe do pico. Não
    # existe garantia — o GitHub não dá SLA pra cron — mas dá 4 chances/hora de a grade não
    # envelhecer, e cada tentativa evita a janela mais concorrida. É de graça (repo público).
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: # botão "Run workflow" pra rodar na hora

permissions:
  contents: write # commitar web/today.json de volta (fonte única)
  pages: write # publicar no GitHub Pages
  id-token: write

concurrency:
  # Grupo PRÓPRIO, de propósito. Antes isto compartilhava o grupo "pages" com o deploy e o
  # update-model: uma rajada de pushes ocupava a fila e o GitHub CANCELAVA a execução
  # agendada que estava esperando. Aconteceu em 20/07 — a grade ficou 3h parada e o app
  # exibiu "AO VIVO" num jogo já encerrado. Atualizar o DADO é mais importante que publicar:
  # o dado nunca pode ser cancelado por causa de um push nosso.
  group: fixtures
  cancel-in-progress: false

jobs:
  grade:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Buscar os jogos do dia (Flashscore; usa os modelos já commitados)
        run: node pipeline/fixtures.js
      - name: Buscar resultados recentes (forma/descanso frescos, últimos ~14 dias)
        run: node pipeline/recent-results.js
      - name: Commitar grade + resultados se mudaram ([skip ci] — o deploy é feito abaixo)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/today.json web/recent-results.json
          if git diff --staged --quiet; then
            echo "Sem mudanças — nada a commitar."
          else
            git commit -m "chore(grade): jogos e resultados atualizados [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
      # A publicação é o "melhor esforço": como agora rodamos fora do grupo "pages", duas
      # publicações podem se cruzar e uma falhar. Se isso acontecer, o dado JÁ foi commitado
      # acima e a próxima execução publica — não faz sentido marcar a atualização como falha.
      - uses: actions/configure-pages@v5
        continue-on-error: true
      - uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
