name: Atualizar modelo e publicar (diário)

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC (~05:00 Brasília), todo dia
  workflow_dispatch: # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write # p/ commitar os dados regenerados de volta ao repo (fonte única)
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependências
        run: npm ci
      - name: Re-treinar os modelos (ATP e WTA) com os dados de hoje
        run: |
          node pipeline/train.js ATP
          node pipeline/train.js WTA
      - name: Enriquecer ATP e WTA com stats de saque (dossiês)
        run: node pipeline/serve-stats.js
      - name: Enriquecer com padrões de jogo (estilo, pressão, bio)
        run: node pipeline/patterns-ingest.js
      - name: Enriquecer com a trajetória de ranking (momento de carreira)
        run: node pipeline/rankings-ingest.js
      - name: Buscar os jogos do dia (grade Flashscore, ESPN de fallback)
        run: node pipeline/fixtures.js
      - name: Gerar histórico de partidas (scouting)
        run: node pipeline/matches.js
      - name: Rodar os testes (segurança)
        run: npm test
      - name: Salvar os dados atualizados no repositório (fonte única — evita reverter no próximo push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/model-atp.json web/model-wta.json web/today.json web/matches.json
          if git diff --staged --quiet; then
            echo "Sem mudanças nos dados — nada a commitar."
          else
            git commit -m "chore(dados): atualização diária automática [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
