<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1a" />
  <meta name="description" content="Projeto Investidor — apoio à decisão para trade de tênis." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <title>Projeto Investidor</title>
  <script>
    // Tema: claro é o padrão; respeita a escolha salva.
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('investidor.theme'); } catch (e) {}
      document.documentElement.setAttribute('data-theme', saved === 'dark' ? 'dark' : 'light');
    })();
  </script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="Navegação">
      <div class="side-brand">
        <span class="brand-mark" aria-hidden="true"><svg width="21" height="21" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7.4" stroke="#fff" stroke-width="1.7"/><path d="M3.2 5.4c4 2 4 7.2 0 9.2M16.8 5.4c-4 2-4 7.2 0 9.2" stroke="#fff" stroke-width="1.7"/></svg></span>
        <span class="brand-text"><strong>Investidor</strong><span>trade de tênis</span></span>
      </div>
      <nav class="side-nav">
        <button class="tab active" data-target="banca" aria-current="page">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="2.5" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2.3" fill="currentColor"/></svg><span>Banca</span>
        </button>
        <button class="tab" data-target="registrar">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Registrar</span>
        </button>
        <button class="tab" data-target="historico">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>Histórico</span>
        </button>
        <button class="tab" data-target="analise">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 19V5m0 14h16M8 15l3-4 3 3 4-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Análise</span>
        </button>
        <button class="tab" data-target="jogadores">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.8"/><path d="M5 19c0-3.6 3-5.6 7-5.6s7 2 7 5.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>Jogadores</span>
        </button>
      </nav>
      <div class="side-foot">
        <button id="theme-toggle" class="theme-btn" type="button"><span class="theme-ico" aria-hidden="true">◐</span><span>Tema</span></button>
      </div>
    </aside>

    <div class="app-body">
      <main class="app-main">
        <section class="screen active" id="screen-banca" aria-label="Banca"></section>
        <section class="screen" id="screen-registrar" aria-label="Registrar trade"></section>
        <section class="screen" id="screen-historico" aria-label="Histórico"></section>
        <section class="screen" id="screen-analise" aria-label="Análise"></section>
        <section class="screen" id="screen-jogadores" aria-label="Jogadores"></section>
      </main>
    </div>
  </div>

  <nav class="tabbar" aria-label="Navegação principal">
    <button class="tab active" data-target="banca" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="2.5" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2.3" fill="currentColor"/></svg><span>Banca</span>
    </button>
    <button class="tab" data-target="registrar">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg><span>Registrar</span>
    </button>
    <button class="tab" data-target="historico">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Histórico</span>
    </button>
    <button class="tab" data-target="analise">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 19V5m0 14h16M8 15l3-4 3 3 4-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Análise</span>
    </button>
    <button class="tab" data-target="jogadores">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="2"/><path d="M5 19c0-3.6 3-5.6 7-5.6s7 2 7 5.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Jogadores</span>
    </button>
  </nav>

  <div id="auth-root"></div>
  <div id="modal-root"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
