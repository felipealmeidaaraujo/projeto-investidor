<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1116" />
  <meta name="description" content="Projeto Investidor — apoio à decisão para trade de tênis." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="styles.css" />
  <title>Projeto Investidor</title>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">🎾</span>
      <div class="brand-text">
        <strong>Projeto Investidor</strong>
        <span class="brand-sub">Disciplina &amp; Trade — Tênis</span>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section class="screen active" id="screen-banca" aria-label="Banca"></section>

    <section class="screen" id="screen-registrar" aria-label="Registrar trade"></section>

    <section class="screen" id="screen-historico" aria-label="Histórico"></section>

    <section class="screen" id="screen-analise" aria-label="Análise"></section>
  </main>

  <nav class="tabbar" aria-label="Navegação principal">
    <button class="tab active" data-target="banca" aria-current="page">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h18v10H3z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg>
      <span>Banca</span>
    </button>
    <button class="tab" data-target="registrar">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
      <span>Registrar</span>
    </button>
    <button class="tab" data-target="historico">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Histórico</span>
    </button>
    <button class="tab" data-target="analise">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5m0 14h16M8 15l3-4 3 3 4-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Análise</span>
    </button>
  </nav>

  <div id="modal-root"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
